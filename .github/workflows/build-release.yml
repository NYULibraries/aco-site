name: Build and Release Laravel App
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup PHP 8.2 and Install Dependencies
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, libxml, zip, bcmath, gd, pdo_sqlite, xsl
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install PHP Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # 2. Setup pnpm & Build Assets
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install & Build Assets
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      # 3. Verify build outputs
      - name: Verify Build Assets
        run: |
          if [ -d "public/build" ]; then
            echo "Assets found in public/build"
            ls -la public/build
          else
            echo "ERROR: public/build not found. Assets failed to compile."
            exit 1
          fi

      # 4. Determine if this is a prerelease
      - name: Check if prerelease
        id: check_prerelease
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" =~ (alpha|beta|rc|dev|preview) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a PRERELEASE: $TAG"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a STABLE RELEASE: $TAG"
          fi

      # 5. Cleanup & Packaging
      - name: Prepare Archive
        run: |
          # Create necessary directories for Laravel
          mkdir -p storage/framework/{cache,sessions,views}
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

          # Set proper permissions
          chmod -R 775 storage bootstrap/cache

          # Remove build-only files
          rm -rf node_modules .git .github tests

          # Create archive using the current directory (.)
          tar -cpzf ../release.tar.gz \
            --transform 's/^\./aco-site/' \
            --exclude='./.env' \
            --exclude='./bootstrap/cache/*.php' \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./tests' \
            --exclude='./.pnpm-store' \
            --exclude='./.devcontainer' \
            --exclude='./docker' \
            --exclude='./docker-compose.yml' \
            --exclude='./Dockerfile' \
            --exclude='./.dockerignore' \
            --exclude='./.editorconfig' \
            --exclude='./.gemini' \
            --exclude='./GEMINI.md' \
            --exclude='./.gitattributes' \
            --exclude='./.gitignore' \
            --exclude='./opencode.json' \
            --exclude='./pnpm-lock.yaml' \
            --exclude='./.prettierignore' \
            --exclude='./.prettierrc' \
            --exclude='./README.md' \
            --exclude='./tsconfig.json' \
            --exclude='./boost.json' \
            --exclude='./vite.config.ts' \
            --exclude='./public/vendor/telescope' \
            --exclude='./AGENTS.md' \
            .

          mv ../release.tar.gz .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dev:
    needs: create-release
    runs-on: ubuntu-latest
    if: contains(github.ref, 'rc') || contains(github.ref, 'dev')
    steps:
      - name: Deploy to Development Server
        run: echo "Deploying to DEVELOPMENT server..."

  deploy-prod:
    needs: create-release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') && !contains(github.ref, 'dev') && !contains(github.ref, 'preview')"
    steps:
      - name: Deploy to Production Server
        run: echo "Deploying to PRODUCTION server..."
